version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bank_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "
      until pg_isready -h postgres -p 5432; do
        echo 'Waiting for PostgreSQL...';
        sleep 2;
      done &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres/bank_statements
      REDIS_URL: redis://redis:6379/0
      S3_BUCKET: your-bucket-name
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: your-access-key
      AWS_SECRET_ACCESS_KEY: your-secret-key
      STORAGE_TYPE: local
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A app.tasks worker --loglevel=info --pool=asyncio
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres/bank_statements
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

   frontend:
     build:
       context: ./frontend
       dockerfile: Dockerfile
     ports:
       - "3000:4173"
     depends_on:
       - backend

volumes:
  postgres_data: